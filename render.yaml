databases:
  - name: nexus-db
    databaseName: nexus
    user: rithin
    plan: free

services:
  # FastAPI Backend
  - type: web
    name: nexus-backend
    env: python
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt && python migrate.py"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.8"
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        value: "NEXUS_Admin@123"

  # React Frontend
  - type: web
    name: nexus-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    envVars:
      - key: NODE_VERSION
        value: "20.11.1"
      - key: VITE_API_URL
        fromService:
          type: web
          name: nexus-backend
          property: host
