databases:
  - name: nexus-db
    databaseName: nexus
    user: rithin
    plan: free

services:
  # FastAPI Backend
  - type: web
    name: nexus-backend
    env: python
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt && python migrate.py"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.8"
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-db
          property: connectionString
      # IMPORTANT: Set this to a strong, fixed value in the Render dashboard.
      # Using generateValue: true causes all JWTs to be invalidated on every redeploy.
      - key: SECRET_KEY
        sync: false
      # This password is what the startup self-heal uses to create/reset the admin account.
      # It MUST match the password you use to log in as admin.
      - key: ADMIN_PASSWORD
        value: "Helenricky@04"

  # React Frontend
  - type: web
    name: nexus-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20.11.1"
      # Let Render inject the exact backend URL dynamically
      - key: VITE_API_URL
        fromService:
          type: web
          name: nexus-backend
          property: host
